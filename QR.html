<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>精准二维码生成器 | 支持中文·扫描即原样</title>
    <!-- 使用稳定且对 UTF-8 完美支持的 qrcode 库 (node-qrcode 浏览器版) -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(145deg, #f6f9fc 0%, #eef2f5 100%);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 24px 20px;
        }

        .qr-card {
            max-width: 780px;
            width: 100%;
            background: rgba(255, 255, 255, 0.96);
            border-radius: 48px;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.25), 0 1px 2px rgba(0, 0, 0, 0.02);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        .card-header {
            padding: 32px 32px 12px 32px;
            border-bottom: 1px solid #e9edf2;
        }

        .card-header h1 {
            font-size: 1.85rem;
            font-weight: 620;
            background: linear-gradient(135deg, #1A2A3F, #2C5368);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .card-header h1::before {
            content: "◢◤";
            font-weight: 400;
            background: none;
            color: #2C6B8F;
            font-size: 1.8rem;
        }

        .sub {
            color: #5e6f8d;
            margin-top: 8px;
            font-size: 0.9rem;
            font-weight: 450;
        }

        .qr-content {
            padding: 24px 32px 32px 32px;
        }

        .input-group {
            margin-bottom: 28px;
        }

        .input-label {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 10px;
            font-weight: 540;
            color: #1f2a3e;
            font-size: 0.9rem;
        }

        .char-hint {
            font-size: 0.75rem;
            color: #7b8ba3;
            background: #f0f3f7;
            padding: 3px 8px;
            border-radius: 40px;
        }

        textarea {
            width: 100%;
            border: 1.5px solid #e2e8f0;
            border-radius: 28px;
            padding: 14px 20px;
            font-size: 0.95rem;
            font-family: inherit;
            resize: vertical;
            background: #ffffff;
            transition: 0.2s;
            line-height: 1.4;
            outline: none;
            color: #0f172a;
        }

        textarea:focus {
            border-color: #2c7da0;
            box-shadow: 0 0 0 3px rgba(44, 125, 160, 0.15);
        }

        .settings-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin: 24px 0 20px 0;
            background: #f9fbfd;
            padding: 20px 20px;
            border-radius: 32px;
        }

        .setting-item {
            flex: 1;
            min-width: 130px;
        }

        .setting-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: #4b5e7a;
            margin-bottom: 8px;
        }

        select, .color-row {
            background: white;
            border: 1px solid #cfdfed;
            border-radius: 40px;
            padding: 8px 16px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            width: 100%;
        }

        select {
            background-color: white;
        }

        .color-row {
            display: flex;
            gap: 12px;
            align-items: center;
            padding: 4px 12px;
        }

        input[type="color"] {
            width: 44px;
            height: 36px;
            border-radius: 30px;
            border: 1px solid #cddfec;
            cursor: pointer;
            background: white;
            padding: 2px;
        }

        .scale-control {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        input[type="range"] {
            flex: 1;
            height: 4px;
            -webkit-appearance: none;
            background: #d4e0ea;
            border-radius: 10px;
        }

        input[type="range"]:focus {
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: #2c7da0;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 1px 4px rgba(0,0,0,0.2);
            border: none;
        }

        .scale-value {
            width: 55px;
            text-align: center;
            background: #eef3f9;
            padding: 5px 0;
            border-radius: 40px;
            font-size: 0.8rem;
        }

        .action-buttons {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            margin: 18px 0 28px 0;
        }

        .btn {
            border: none;
            padding: 12px 24px;
            border-radius: 44px;
            font-weight: 590;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s ease;
            background: #f0f4f9;
            color: #1f3a4b;
            flex: 1;
            text-align: center;
        }

        .btn-primary {
            background: #1f3a4b;
            color: white;
            box-shadow: 0 6px 14px rgba(31, 58, 75, 0.25);
        }

        .btn-primary:hover {
            background: #2c5368;
            transform: translateY(-2px);
        }

        .btn-outline {
            border: 1.5px solid #cbdde9;
            background: white;
        }

        .btn-outline:hover {
            background: #f1f9fe;
            border-color: #2c7da0;
        }

        .qrcode-stage {
            background: #ffffff;
            border-radius: 32px;
            padding: 28px 20px 20px 20px;
            text-align: center;
            margin-top: 12px;
            box-shadow: inset 0 1px 2px #00000008, 0 8px 20px rgba(0,0,0,0.03);
            border: 1px solid #ecf3f8;
        }

        .canvas-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto;
            background: #fefefe;
            border-radius: 24px;
        }

        canvas {
            display: block;
            border-radius: 20px;
            box-shadow: 0 12px 24px -12px rgba(0, 0, 0, 0.2);
            max-width: 100%;
            height: auto;
            background: white;
        }

        .info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 18px;
            font-size: 0.7rem;
            color: #6f85a2;
            background: #f7fafc;
            padding: 8px 18px;
            border-radius: 60px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .error-msg {
            color: #c23d4b;
            background: #ffe9eb;
            padding: 8px 14px;
            border-radius: 60px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        footer {
            font-size: 0.7rem;
            text-align: center;
            padding: 16px 32px 24px;
            color: #8a9bb0;
            border-top: 1px solid #eef2f6;
        }
    </style>
</head>
<body>

<div class="qr-card">
    <div class="card-header">
        <h1>二维码生成器</h1>
        <div class="sub">完全支持中文、Unicode · 扫描即原样</div>
    </div>

    <div class="qr-content">
        <div class="input-group">
            <div class="input-label">
                <span>📝 文本 / 网址</span>
                <span class="char-hint" id="charCount">0 字符</span>
            </div>
            <textarea id="qrText" rows="2" placeholder="输入任意文字、链接或表情符号...&#10;例如：你好，世界！ 或 https://deepseek.com">https://deepseek.com  — 中文支持完美</textarea>
        </div>

        <div class="settings-panel">
            <div class="setting-item">
                <div class="setting-label">🔧 纠错等级</div>
                <select id="errorCorrection">
                    <option value="L">L (7%)</option>
                    <option value="M" selected>M (15%) 推荐</option>
                    <option value="Q">Q (25%)</option>
                    <option value="H">H (30%)</option>
                </select>
            </div>
            <div class="setting-item">
                <div class="setting-label">🎨 前景色</div>
                <div class="color-row">
                    <input type="color" id="foregroundColor" value="#1f2a3e">
                    <span style="font-size:0.75rem;">二维码颜色</span>
                </div>
            </div>
            <div class="setting-item">
                <div class="setting-label">⬜ 背景色</div>
                <div class="color-row">
                    <input type="color" id="backgroundColor" value="#FFFFFF">
                    <span style="font-size:0.75rem;">底色</span>
                </div>
            </div>
            <div class="setting-item">
                <div class="setting-label">🔍 缩放尺寸 (px)</div>
                <div class="scale-control">
                    <input type="range" id="qrWidth" min="200" max="600" step="10" value="350">
                    <span class="scale-value" id="widthValue">350px</span>
                </div>
                <div style="font-size: 0.7rem; margin-top: 4px; color:#5d718b;">画布宽度，自动保持清晰</div>
            </div>
        </div>

        <div class="action-buttons">
            <button class="btn btn-primary" id="generateBtn">✨ 生成二维码</button>
            <button class="btn btn-outline" id="downloadBtn">⬇️ 下载 PNG</button>
        </div>

        <div class="qrcode-stage">
            <div class="canvas-wrapper" id="canvasContainer">
                <canvas id="qrCanvas" width="350" height="350"></canvas>
            </div>
            <div class="info-bar" id="infoBar">
                <span>✔️ 点击「生成」或修改内容实时刷新</span>
                <span id="matrixInfo">等待生成</span>
            </div>
            <div id="errorMessage" style="display: none;" class="error-msg"></div>
        </div>
    </div>
    <footer>
        基于 QRCode 库 · 完美支持 UTF-8，确保扫描结果与输入完全一致
    </footer>
</div>

<script>
    (function() {
        // DOM 元素
        const textarea = document.getElementById('qrText');
        const generateBtn = document.getElementById('generateBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const errorCorrectionSelect = document.getElementById('errorCorrection');
        const foregroundColorPicker = document.getElementById('foregroundColor');
        const backgroundColorPicker = document.getElementById('backgroundColor');
        const qrWidthSlider = document.getElementById('qrWidth');
        const widthValueSpan = document.getElementById('widthValue');
        const canvasEl = document.getElementById('qrCanvas');
        const errorMessageDiv = document.getElementById('errorMessage');
        const matrixInfoSpan = document.getElementById('matrixInfo');
        const charCountSpan = document.getElementById('charCount');

        // 当前显示的文本和参数
        let currentText = textarea.value;
        let currentWidth = parseInt(qrWidthSlider.value, 10);
        let currentErrorLevel = errorCorrectionSelect.value;
        let currentForeground = foregroundColorPicker.value;
        let currentBackground = backgroundColorPicker.value;

        // 更新字符计数
        function updateCharCount() {
            const len = textarea.value.length;
            charCountSpan.innerText = `${len} 字符`;
        }

        // 显示错误
        function showError(msg) {
            errorMessageDiv.style.display = 'block';
            errorMessageDiv.innerText = `❌ ${msg}`;
            matrixInfoSpan.innerText = "生成失败";
        }

        function hideError() {
            errorMessageDiv.style.display = 'none';
            errorMessageDiv.innerText = '';
        }

        // 核心生成函数：使用 QRCode 库，支持 UTF-8 完整文本
        async function generateQRCode(text, width, errorLevel, fgColor, bgColor) {
            if (!text || text.trim() === "") {
                throw new Error("内容不能为空，请输入文本或网址");
            }
            
            // 设置 canvas 尺寸
            canvasEl.width = width;
            canvasEl.height = width;
            canvasEl.style.width = `${width}px`;
            canvasEl.style.height = `${width}px`;
            
            // 调用 qrcode 库渲染到 canvas
            await QRCode.toCanvas(canvasEl, text, {
                width: width,
                margin: 2,          // 内边距（模块单位，保持美观）
                errorCorrectionLevel: errorLevel,
                color: {
                    dark: fgColor,
                    light: bgColor
                }
            });
            
            // 获取版本信息（无法直接获取矩阵版本，但可以显示尺寸）
            matrixInfoSpan.innerText = `画布 ${width}×${width} px · 纠错 ${errorLevel} · UTF-8 编码`;
        }

        // 重新生成 (带防抖与错误处理)
        let generating = false;
        async function regenerate() {
            if (generating) return;
            generating = true;
            hideError();
            
            const text = textarea.value;
            const width = parseInt(qrWidthSlider.value, 10);
            const errorLevel = errorCorrectionSelect.value;
            const fg = foregroundColorPicker.value;
            const bg = backgroundColorPicker.value;
            
            // 更新全局记录
            currentText = text;
            currentWidth = width;
            currentErrorLevel = errorLevel;
            currentForeground = fg;
            currentBackground = bg;
            
            try {
                await generateQRCode(text, width, errorLevel, fg, bg);
                // 成功后如果有之前的错误样式清除
                hideError();
            } catch (err) {
                console.error(err);
                showError(err.message || "生成失败，请检查内容长度是否超出二维码容量");
                // 清空 canvas 并显示占位
                const ctx = canvasEl.getContext('2d');
                ctx.fillStyle = "#f0f2f5";
                ctx.fillRect(0, 0, canvasEl.width, canvasEl.height);
                ctx.fillStyle = "#8f9bb3";
                ctx.font = "14px system-ui";
                ctx.fillText("无法生成", canvasEl.width/2-40, canvasEl.height/2);
                matrixInfoSpan.innerText = "错误";
            } finally {
                generating = false;
            }
        }
        
        // 下载功能
        async function downloadQR() {
            // 确保最新内容已生成
            if (textarea.value !== currentText || 
                parseInt(qrWidthSlider.value,10) !== currentWidth ||
                errorCorrectionSelect.value !== currentErrorLevel ||
                foregroundColorPicker.value !== currentForeground ||
                backgroundColorPicker.value !== currentBackground) {
                // 参数变化，先重新生成保证下载最新
                await regenerate();
            } else if (!currentText || currentText.trim() === "") {
                showError("请填写内容后再下载");
                return;
            }
            
            // 再次确保 canvas 有效
            if (!canvasEl || canvasEl.width === 0) {
                showError("二维码未生成，请先生成");
                return;
            }
            
            try {
                const link = document.createElement('a');
                const timestamp = new Date().toISOString().slice(0,19).replace(/:/g, '-');
                let fileName = `qrcode_${timestamp}.png`;
                const textPrefix = currentText.trim().substring(0, 20).replace(/[^a-z0-9\u4e00-\u9fa5]/gi, '_');
                if (textPrefix) fileName = `qrcode_${textPrefix}_${timestamp}.png`;
                link.download = fileName;
                link.href = canvasEl.toDataURL('image/png');
                link.click();
                hideError();
            } catch (err) {
                showError("下载失败，请重试");
            }
        }
        
        // 监听参数变化，实时生成（让用户无需反复点击生成按钮，更流畅）
        function bindEvents() {
            // 内容修改后自动生成（防抖）
            let debounceTimer;
            textarea.addEventListener('input', () => {
                updateCharCount();
                clearTimeout(debounceTimer);
                debounceTimer = setTimeout(() => {
                    regenerate();
                }, 300);
            });
            
            // 纠错级别变更
            errorCorrectionSelect.addEventListener('change', () => {
                regenerate();
            });
            
            // 颜色变化直接重绘
            foregroundColorPicker.addEventListener('input', () => {
                regenerate();
            });
            backgroundColorPicker.addEventListener('input', () => {
                regenerate();
            });
            
            // 尺寸滑动条
            qrWidthSlider.addEventListener('input', (e) => {
                const val = e.target.value;
                widthValueSpan.innerText = `${val}px`;
                regenerate();
            });
            
            // 手动生成按钮（强制刷新）
            generateBtn.addEventListener('click', () => {
                regenerate();
            });
            
            downloadBtn.addEventListener('click', downloadQR);
        }
        
        // 初始化：加载默认二维码
        async function init() {
            updateCharCount();
            bindEvents();
            widthValueSpan.innerText = `${qrWidthSlider.value}px`;
            // 生成初始二维码
            await regenerate();
        }
        
        init();
    })();
</script>
</body>
</html>
